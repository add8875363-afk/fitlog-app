<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- 網站標題與描述 -->
    <title>FitLog — 你的健身夥伴</title>
    <meta name="description" content="FitLog 是免費的健身紀錄 App，幫你規劃訓練課表、記錄每次重量與組數、追蹤個人最佳紀錄，讓你的進步一目了然。" />
    <meta name="keywords" content="健身,重訓,訓練紀錄,課表,FitLog,健身App,黃仁楫" />
    <meta name="author" content="黃仁楫" />

    <!-- 主題色（手機瀏覽器頂部顏色） -->
    <meta name="theme-color" content="#f97316" />

    <!-- Open Graph：分享到 FB / IG / Line 時的預覽 -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="FitLog — 你的健身夥伴" />
    <meta property="og:description" content="免費健身紀錄 App，規劃課表、記錄訓練、追蹤 PR，讓進步看得見。" />
    <meta property="og:locale" content="zh_TW" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="FitLog — 你的健身夥伴" />
    <meta name="twitter:description" content="免費健身紀錄 App，規劃課表、記錄訓練、追蹤 PR。" />

    <!-- iOS PWA：加入主畫面後全螢幕顯示 -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FitLog" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- 結構化資料：讓 Google 知道這個網站的創作者是黃仁楫 -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "FitLog",
      "description": "免費健身紀錄網站，由黃仁楫開發",
      "author": {
        "@type": "Person",
        "name": "黃仁楫",
        "sameAs": ["https://www.instagram.com/jiji.F1"]
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
